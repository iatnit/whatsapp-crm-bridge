<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Manager - WhatsApp CRM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #111b21; }
.header { background: #008069; color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.header-left h1 { font-size: 20px; font-weight: 600; }
.header-left p { font-size: 12px; opacity: .8; margin-top: 2px; }
.refresh-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.refresh-btn:hover { background: rgba(255,255,255,.3); }
.stats { display: flex; gap: 12px; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
.stat { padding: 8px 16px; border-radius: 8px; background: #f0f2f5; font-size: 14px; white-space: nowrap; cursor: pointer; transition: all .15s; user-select: none; }
.stat:hover { background: #e0e0e0; }
.stat.active { background: #008069; color: #fff; }
.stat.active b { color: #fff; }
.stat b { color: #008069; }
.controls { padding: 12px 20px; background: #fff; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #e0e0e0; }
.controls input { flex: 1; min-width: 140px; padding: 10px 14px; border: 1px solid #d1d7db; border-radius: 8px; font-size: 14px; outline: none; }
.controls input:focus { border-color: #008069; }
.controls select { padding: 10px 14px; border: 1px solid #d1d7db; border-radius: 8px; font-size: 14px; background: #fff; outline: none; cursor: pointer; }
.list { padding: 12px 20px; display: grid; gap: 10px; max-width: 900px; margin: 0 auto; }
.card { background: #fff; border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.08); transition: box-shadow .15s; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: #dfe5e7; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: #667781; flex-shrink: 0; margin-top: 2px; }
.info { flex: 1; min-width: 0; }
.info .name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.info .name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.info .phone { font-size: 12px; color: #667781; margin-top: 1px; }
.tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e7f7ef; color: #008069; }
.tag.warn { background: #fff3cd; color: #856404; }
.tag.muted { background: #f0f2f5; color: #667781; }
/* Status badges (inline after name) */
.badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
.badge.ai-on { background: #dcfce7; color: #166534; }
.badge.ai-off { background: #f3f4f6; color: #6b7280; }
.badge.big { background: #fef3c7; color: #92400e; }
.badge.medium { background: #dbeafe; color: #1e40af; }
.badge.small { background: #f3f4f6; color: #6b7280; }
/* Size selector */
.size-select { font-size: 11px; padding: 2px 4px; border: 1px solid #d1d7db; border-radius: 4px; background: #fff; cursor: pointer; outline: none; color: #111b21; }
/* Source badges */
.source-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0; }
.source-badge.both { background: #dcfce7; color: #166534; }
.source-badge.hubspot { background: #dbeafe; color: #1e40af; }
.source-badge.local { background: #ffedd5; color: #9a3412; }
/* HubSpot property chips */
.hs-props { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.hs-chip { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.hs-chip.stage { background: #ede9fe; color: #5b21b6; }
.hs-chip.tier { background: #fce7f3; color: #9d174d; }
.hs-chip.type { background: #e0f2fe; color: #075985; }
.hs-chip.product { background: #fef3c7; color: #92400e; }
/* Editable tags row */
.ctags-row { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
.ctag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #fee2e2; color: #991b1b; display: inline-flex; align-items: center; gap: 3px; }
.ctag .x { cursor: pointer; font-weight: 700; font-size: 13px; line-height: 1; opacity: .6; }
.ctag .x:hover { opacity: 1; }
.add-tag-btn { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f2f5; color: #667781; cursor: pointer; border: 1px dashed #d1d7db; position: relative; }
.add-tag-btn:hover { background: #e0e0e0; }
/* Tag dropdown */
.tag-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #d1d7db; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 20; min-width: 150px; margin-top: 4px; }
.tag-dropdown div { padding: 8px 12px; font-size: 12px; cursor: pointer; }
.tag-dropdown div:hover { background: #f0f2f5; }
/* Right-side toggles */
.toggles { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 2px; }
.toggle-row { display: flex; align-items: center; gap: 6px; }
.toggle-row .tl { font-size: 10px; color: #667781; width: 24px; text-align: right; }
.toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; inset: 0; background: #ccc; border-radius: 20px; transition: .2s; }
.toggle .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .slider { background: #25d366; }
.toggle input:checked + .slider::before { transform: translateX(16px); }
.toggle input:disabled + .slider { opacity: .5; cursor: wait; }
.empty { text-align: center; padding: 60px 20px; color: #667781; }
.loading { text-align: center; padding: 60px 20px; color: #667781; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 14px 20px; max-width: 900px; margin: 0 auto; }
.pagination button { padding: 6px 14px; border: 1px solid #d1d7db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; color: #111b21; }
.pagination button:hover:not(:disabled) { background: #f0f2f5; }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination .page-info { font-size: 13px; color: #667781; }
@media (max-width: 480px) {
  .stats { gap: 8px; padding: 10px 14px; }
  .stat { padding: 6px 10px; font-size: 12px; }
  .controls { padding: 10px 14px; }
  .list { padding: 10px 14px; }
  .card { padding: 12px; gap: 10px; }
  .avatar { width: 38px; height: 38px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>AI Manager</h1>
    <p>Manage AI auto-reply for WhatsApp customers</p>
  </div>
  <button class="refresh-btn" onclick="refreshData()">Refresh</button>
</div>

<div class="stats" id="stats">
  <div class="stat active" onclick="statClick('all')" id="st-all">Total: <b id="s-total">-</b></div>
  <div class="stat" onclick="statClick('ai-on')" id="st-ai-on">AI On: <b id="s-on">-</b></div>
  <div class="stat" onclick="statClick('ai-off')" id="st-ai-off">AI Off: <b id="s-off">-</b></div>
  <div class="stat" onclick="statClick('big')" id="st-big">Big: <b id="s-big">-</b></div>
  <div class="stat" onclick="statClick('medium')" id="st-medium">Med: <b id="s-med">-</b></div>
  <div class="stat" onclick="statClick('small')" id="st-small">Small: <b id="s-sml">-</b></div>
  <div class="stat" onclick="statClick('both')" id="st-both">Both: <b id="s-both">-</b></div>
  <div class="stat" onclick="statClick('hubspot')" id="st-hubspot">HubSpot: <b id="s-hs">-</b></div>
  <div class="stat" onclick="statClick('local')" id="st-local">Local: <b id="s-local">-</b></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search name or phone...">
  <select id="f-source">
    <option value="all">Source: All</option>
    <option value="both">Both</option>
    <option value="hubspot">HubSpot</option>
    <option value="local">Local</option>
  </select>
  <select id="f-ai">
    <option value="all">AI: All</option>
    <option value="on">AI On</option>
    <option value="off">AI Off</option>
  </select>
  <select id="f-size">
    <option value="all">Size: All</option>
    <option value="big">Big</option>
    <option value="medium">Medium</option>
    <option value="small">Small</option>
    <option value="none">Unclassified</option>
  </select>
  <select id="f-type">
    <option value="all">More: All</option>
    <option value="matched">Matched</option>
    <option value="unmatched">Unmatched</option>
    <option value="has-tags">Has Tags</option>
  </select>
</div>

<div class="list" id="list">
  <div class="loading">Loading customers...</div>
</div>
<div class="pagination" id="pagination" style="display:none;">
  <button onclick="prevPage()">&laquo; Prev</button>
  <span class="page-info" id="page-info"></span>
  <button onclick="nextPage()">Next &raquo;</button>
</div>

<script>
const TAG_OPTIONS = ['hot_lead', 'vip', 'repeat_buyer', 'first_timer', 'price_shopper', 'risky', 'agent_potential'];
const TAG_LABELS = { hot_lead: 'Hot Lead', vip: 'VIP', repeat_buyer: 'Repeat Buyer', first_timer: 'First Timer', price_shopper: 'Price Shopper', risky: 'Risky', agent_potential: 'Agent Potential' };

let customers = [];
let openDropdown = null;
let currentPage = 1;
const PAGE_SIZE = 50;
const SOURCE_ORDER = { both: 0, hubspot: 1, local: 2 };

// Stat button → dropdown mapping
const STAT_MAP = {
  'all':     { source: 'all', ai: 'all', size: 'all' },
  'ai-on':   { ai: 'on' },
  'ai-off':  { ai: 'off' },
  'big':     { size: 'big' },
  'medium':  { size: 'medium' },
  'small':   { size: 'small' },
  'both':    { source: 'both' },
  'hubspot': { source: 'hubspot' },
  'local':   { source: 'local' },
};

function statClick(key) {
  // Reset all dropdowns first
  document.getElementById('f-source').value = 'all';
  document.getElementById('f-ai').value = 'all';
  document.getElementById('f-size').value = 'all';
  document.getElementById('f-type').value = 'all';
  // Apply mapped values
  const m = STAT_MAP[key] || {};
  if (m.source) document.getElementById('f-source').value = m.source;
  if (m.ai) document.getElementById('f-ai').value = m.ai;
  if (m.size) document.getElementById('f-size').value = m.size;
  // Highlight active stat
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
  document.getElementById('st-' + key).classList.add('active');
  currentPage = 1;
  render();
}

async function loadCustomers() {
  try {
    const res = await fetch('/api/v1/ai/customers');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    customers = (data.customers || []).sort((a, b) => {
      const sa = SOURCE_ORDER[a.source] ?? 9, sb = SOURCE_ORDER[b.source] ?? 9;
      if (sa !== sb) return sa - sb;
      const na = (a.customer_name || a.display_name || '').toLowerCase();
      const nb = (b.customer_name || b.display_name || '').toLowerCase();
      return na.localeCompare(nb);
    });
    currentPage = 1;
    updateStats();
    render();
  } catch (e) {
    document.getElementById('list').innerHTML =
      '<div class="empty">Failed to load: ' + e.message + '</div>';
  }
}

async function refreshData() {
  document.getElementById('list').innerHTML = '<div class="loading">Refreshing...</div>';
  try {
    await fetch('/api/v1/ai/refresh', { method: 'POST' });
  } catch (e) { /* ignore */ }
  await loadCustomers();
}

function updateStats() {
  const off = customers.filter(c => c.ai_disabled).length;
  const big = customers.filter(c => c.customer_size === 'big').length;
  const med = customers.filter(c => c.customer_size === 'medium').length;
  const sml = customers.filter(c => c.customer_size === 'small').length;
  const both = customers.filter(c => c.source === 'both').length;
  const hs = customers.filter(c => c.source === 'hubspot').length;
  const local = customers.filter(c => c.source === 'local').length;
  document.getElementById('s-total').textContent = customers.length;
  document.getElementById('s-on').textContent = customers.length - off;
  document.getElementById('s-off').textContent = off;
  document.getElementById('s-big').textContent = big;
  document.getElementById('s-med').textContent = med;
  document.getElementById('s-sml').textContent = sml;
  document.getElementById('s-both').textContent = both;
  document.getElementById('s-hs').textContent = hs;
  document.getElementById('s-local').textContent = local;
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const fSource = document.getElementById('f-source').value;
  const fAi = document.getElementById('f-ai').value;
  const fSize = document.getElementById('f-size').value;
  const fType = document.getElementById('f-type').value;
  return customers.filter(c => {
    if (q) {
      const hay = ((c.display_name || '') + ' ' + (c.customer_name || '') + ' ' + (c.phone || '') + ' ' + (c.customer_tags || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (fSource !== 'all' && c.source !== fSource) return false;
    if (fAi === 'on' && c.ai_disabled) return false;
    if (fAi === 'off' && !c.ai_disabled) return false;
    // Size filter
    if (fSize === 'big' && c.customer_size !== 'big') return false;
    if (fSize === 'medium' && c.customer_size !== 'medium') return false;
    if (fSize === 'small' && c.customer_size !== 'small') return false;
    if (fSize === 'none' && c.customer_size) return false;
    // More filter
    if (fType === 'matched' && c.match_status !== 'matched') return false;
    if (fType === 'unmatched' && c.match_status !== 'unmatched') return false;
    if (fType === 'has-tags' && !c.customer_tags) return false;
    return true;
  });
}

function initials(c) {
  const name = c.customer_name || c.display_name || '?';
  return name.charAt(0).toUpperCase();
}

function stageLabel(stage) {
  const map = { new: 'New', early: 'Early', developing: 'Developing', established: 'VIP' };
  return map[stage] || stage || 'New';
}

function sourceBadge(source) {
  if (source === 'both') return '<span class="source-badge both">Both</span>';
  if (source === 'hubspot') return '<span class="source-badge hubspot">HubSpot</span>';
  return '<span class="source-badge local">Local</span>';
}

function hsPropsHtml(c) {
  let chips = '';
  if (c.customer_stage) chips += '<span class="hs-chip stage">' + esc(c.customer_stage) + '</span>';
  if (c.customer_tier) chips += '<span class="hs-chip tier">Tier ' + esc(c.customer_tier) + '</span>';
  if (c.customer_type) chips += '<span class="hs-chip type">' + esc(c.customer_type) + '</span>';
  if (c.product_interest) chips += '<span class="hs-chip product">' + esc(c.product_interest) + '</span>';
  return chips ? '<div class="hs-props">' + chips + '</div>' : '';
}

function ctagsHtml(c) {
  const tags = (c.customer_tags || '').split(';').filter(t => t.trim());
  let html = '<div class="ctags-row">';
  tags.forEach(t => {
    html += '<span class="ctag">' + esc(TAG_LABELS[t] || t) +
      ' <span class="x" onclick="removeTag(\'' + esc(c.phone) + '\', \'' + esc(t) + '\')">&times;</span></span>';
  });
  html += '<span class="add-tag-btn" onclick="showTagDropdown(event, \'' + esc(c.phone) + '\')">+ Tag</span>';
  html += '</div>';
  return html;
}

function render() {
  const allItems = getFiltered();
  const el = document.getElementById('list');
  const pagEl = document.getElementById('pagination');
  const totalPages = Math.max(1, Math.ceil(allItems.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (!allItems.length) {
    el.innerHTML = '<div class="empty">No customers found</div>';
    pagEl.style.display = 'none';
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  const items = allItems.slice(start, start + PAGE_SIZE);
  pagEl.style.display = 'flex';
  document.getElementById('page-info').textContent =
    'Page ' + currentPage + ' of ' + totalPages + ' (' + allItems.length + ' total)';
  const btns = pagEl.querySelectorAll('button');
  btns[0].disabled = currentPage <= 1;
  btns[1].disabled = currentPage >= totalPages;
  el.innerHTML = items.map(c => {
    const name = c.customer_name || c.display_name || c.phone;
    const aiOn = !c.ai_disabled;
    const size = c.customer_size || '';
    const isHsOnly = c.source === 'hubspot';

    // Status badges after name
    const aiBadge = aiOn
      ? '<span class="badge ai-on">AI On</span>'
      : '<span class="badge ai-off">AI Off</span>';
    const SIZE_BADGE = { big: '<span class="badge big">Big</span>', medium: '<span class="badge medium">Med</span>', small: '<span class="badge small">Small</span>' };
    const sizeBadge = SIZE_BADGE[size] || '';

    const matchTag = c.match_status === 'matched'
      ? '<span class="tag">Matched</span>'
      : c.match_status === 'hubspot_only'
        ? ''
        : '<span class="tag warn">Unmatched</span>';
    const stageTag = c.relationship_stage ? '<span class="tag muted">' + stageLabel(c.relationship_stage) + '</span>' : '';
    const msgTag = c.total_messages ? '<span class="tag muted">' + c.total_messages + ' msgs</span>' : '';

    // Right-side controls (only for local/both contacts)
    let togglesHtml = '';
    if (!isHsOnly) {
      const sizeOpts = ['', 'big', 'medium', 'small'].map(v => {
        const label = v ? v.charAt(0).toUpperCase() + v.slice(1) : '--';
        return '<option value="' + v + '"' + (size === v ? ' selected' : '') + '>' + label + '</option>';
      }).join('');
      togglesHtml = '<div class="toggles">' +
        '<div class="toggle-row">' +
          '<span class="tl">AI</span>' +
          '<label class="toggle">' +
            '<input type="checkbox"' + (aiOn ? ' checked' : '') +
            ' onchange="toggleAI(\'' + c.phone + '\', this)">' +
            '<span class="slider"></span>' +
          '</label>' +
        '</div>' +
        '<div class="toggle-row">' +
          '<span class="tl">Size</span>' +
          '<select class="size-select" onchange="setSize(\'' + c.phone + '\', this.value)">' +
            sizeOpts +
          '</select>' +
        '</div>' +
      '</div>';
    }

    return '<div class="card">' +
      '<div class="avatar">' + initials(c) + '</div>' +
      '<div class="info">' +
        '<div class="name-row">' +
          '<div class="name">' + esc(name) + '</div>' +
          aiBadge + sizeBadge + sourceBadge(c.source) +
        '</div>' +
        '<div class="phone">+' + esc(c.phone) + '</div>' +
        '<div class="tags">' + matchTag + stageTag + msgTag + '</div>' +
        hsPropsHtml(c) +
        ctagsHtml(c) +
      '</div>' +
      togglesHtml +
    '</div>';
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Tag editing ──────────────────────────────────────────────────

function showTagDropdown(event, phone) {
  event.stopPropagation();
  closeTagDropdown();

  const c = customers.find(x => x.phone === phone);
  const existing = (c && c.customer_tags || '').split(';').filter(t => t.trim());
  const available = TAG_OPTIONS.filter(t => !existing.includes(t));
  if (!available.length) return;

  const btn = event.currentTarget;
  const dd = document.createElement('div');
  dd.className = 'tag-dropdown';
  dd.id = 'tag-dropdown-active';
  available.forEach(t => {
    const item = document.createElement('div');
    item.textContent = TAG_LABELS[t] || t;
    item.onclick = (e) => { e.stopPropagation(); addTag(phone, t); };
    dd.appendChild(item);
  });
  btn.style.position = 'relative';
  btn.appendChild(dd);
  openDropdown = phone;
}

function closeTagDropdown() {
  const dd = document.getElementById('tag-dropdown-active');
  if (dd) dd.remove();
  openDropdown = null;
}

document.addEventListener('click', closeTagDropdown);

async function saveTags(phone, tagsArray) {
  const tagsStr = tagsArray.join(';');
  try {
    const res = await fetch('/api/v1/ai/tags/' + encodeURIComponent(phone), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tags: tagsStr }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || res.statusText);
    }
    const c = customers.find(x => x.phone === phone);
    if (c) c.customer_tags = tagsStr;
    render();
  } catch (e) {
    alert('Tag update failed: ' + e.message);
  }
}

function addTag(phone, tag) {
  closeTagDropdown();
  const c = customers.find(x => x.phone === phone);
  if (!c) return;
  const existing = (c.customer_tags || '').split(';').filter(t => t.trim());
  if (existing.includes(tag)) return;
  existing.push(tag);
  saveTags(phone, existing);
}

function removeTag(phone, tag) {
  const c = customers.find(x => x.phone === phone);
  if (!c) return;
  const existing = (c.customer_tags || '').split(';').filter(t => t.trim() && t !== tag);
  saveTags(phone, existing);
}

// ── Toggles ─────────────────────────────────────────────────────

async function toggleAI(phone, el) {
  const enable = el.checked;
  const url = enable
    ? '/api/v1/ai/enable/' + phone
    : '/api/v1/ai/disable/' + phone;
  el.disabled = true;
  try {
    const res = await fetch(url, { method: 'POST' });
    if (!res.ok) throw new Error(res.statusText);
    const c = customers.find(x => x.phone === phone);
    if (c) c.ai_disabled = enable ? 0 : 1;
    updateStats();
    render();
  } catch (e) {
    el.checked = !el.checked;
    alert('Toggle failed: ' + e.message);
  }
}

async function setSize(phone, size) {
  try {
    const res = await fetch('/api/v1/ai/customer-size/' + encodeURIComponent(phone), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ size: size }),
    });
    if (!res.ok) throw new Error(res.statusText);
    const c = customers.find(x => x.phone === phone);
    if (c) c.customer_size = size;
    updateStats();
    render();
  } catch (e) {
    alert('Size update failed: ' + e.message);
  }
}

function prevPage() { if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); } }
function nextPage() { currentPage++; render(); window.scrollTo(0, 0); }

function onFilterChange() {
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
  currentPage = 1;
  render();
}
document.getElementById('search').addEventListener('input', onFilterChange);
document.getElementById('f-source').addEventListener('change', onFilterChange);
document.getElementById('f-ai').addEventListener('change', onFilterChange);
document.getElementById('f-size').addEventListener('change', onFilterChange);
document.getElementById('f-type').addEventListener('change', onFilterChange);

loadCustomers();
</script>
</body>
</html>
