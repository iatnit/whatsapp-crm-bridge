<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Detail — LOCACRYSTAL CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
.nav{background:#0f172a;padding:10px 24px;display:flex;gap:16px;align-items:center}
.nav a{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:6px;transition:all .15s}
.nav a:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav a.active{color:#fff;background:#2563eb}
.container{max-width:960px;margin:0 auto;padding:24px}
.profile{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
.profile h1{font-size:1.4rem;color:#0f172a;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
.profile-item{font-size:.875rem;color:#64748b;display:flex;align-items:center;gap:4px;min-height:28px}
.profile-item .label{min-width:100px}
.profile-item span.val{color:#1e293b;font-weight:500}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.75rem;font-weight:700}
.S{background:#fef2f2;color:#dc2626}.A{background:#fffbeb;color:#d97706}
.B{background:#eff6ff;color:#2563eb}.C{background:#f1f5f9;color:#475569}
.D{background:#f8fafc;color:#94a3b8}
.stage-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;background:#ede9fe;color:#5b21b6}
/* Editable fields */
.editable{cursor:pointer;border-bottom:1px dashed #cbd5e1;padding-bottom:1px;color:#1e293b;font-weight:500}
.editable:hover{border-color:#2563eb;color:#2563eb}
.edit-input{padding:2px 6px;border:1px solid #2563eb;border-radius:4px;font-size:.875rem;font-family:inherit;outline:none;width:140px;background:#eff6ff}
.edit-select{padding:2px 4px;border:1px solid #2563eb;border-radius:4px;font-size:.875rem;background:#eff6ff;outline:none;cursor:pointer}
.save-status{font-size:.7rem;color:#22c55e;margin-left:4px;opacity:0;transition:opacity .3s}
.save-status.show{opacity:1}
.save-status.err{color:#dc2626}
.chat{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;flex-direction:column}
.chat-header{padding:16px 24px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.chat-header h2{font-size:1.1rem;color:#0f172a}
.chat-header .msg-count{color:#94a3b8;font-size:.85rem}
.chat-list{max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:20px 24px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:.875rem;line-height:1.4;word-break:break-word}
.msg.inbound{background:#e2e8f0;align-self:flex-start;border-bottom-left-radius:4px}
.msg.outbound{background:#2563eb;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg .meta{font-size:.7rem;margin-top:4px;opacity:.6}
.msg.outbound .meta{color:rgba(255,255,255,.7)}
.msg .media-tag{font-style:italic;opacity:.7}
.day-sep{text-align:center;font-size:.75rem;color:#94a3b8;padding:8px 0}
.compose{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:8px}
.compose textarea{flex:1;padding:10px 14px;border:1px solid #d1d7db;border-radius:8px;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:42px;max-height:120px}
.compose textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.compose button{padding:10px 20px;background:#25d366;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.compose button:hover{background:#128c7e}
.compose button:disabled{opacity:.5;cursor:wait}
.send-status{font-size:.75rem;padding:4px 24px;color:#64748b}
.send-status.error{color:#dc2626}
.templates{padding:8px 24px;border-top:1px solid #f1f5f9;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tpl-label{font-size:.75rem;color:#94a3b8;font-weight:600}
.tpl-btn{font-size:.75rem;padding:4px 10px;border:1px solid #d1d7db;border-radius:6px;background:#fff;cursor:pointer;color:#475569;white-space:nowrap}
.tpl-btn:hover{background:#eff6ff;border-color:#2563eb;color:#2563eb}
.loading{text-align:center;color:#94a3b8;padding:40px}
.back-link{display:inline-flex;align-items:center;gap:4px;color:#2563eb;text-decoration:none;font-size:.85rem;margin-bottom:16px}
.back-link:hover{text-decoration:underline}
@media(max-width:768px){
  .nav{padding:8px 12px;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nav a{font-size:12px;padding:5px 8px;white-space:nowrap;flex-shrink:0}
  .container{padding:10px}
  .profile{padding:14px;margin-bottom:12px;border-radius:8px}
  .profile h1{font-size:1.15rem;gap:6px}
  .profile-grid{grid-template-columns:1fr}
  .profile-item{font-size:.8rem;gap:2px}
  .profile-item .label{min-width:72px;font-size:.75rem}
  .edit-input{width:100%;max-width:200px}
  .edit-select{max-width:160px}
  .chat{border-radius:8px}
  .chat-header{padding:12px 14px}
  .chat-header h2{font-size:1rem}
  .chat-list{padding:12px 10px;max-height:calc(100vh - 380px);gap:4px}
  .msg{max-width:88%;padding:8px 10px;font-size:.82rem;border-radius:10px}
  .msg .meta{font-size:.65rem}
  .compose{padding:10px;gap:6px;position:sticky;bottom:0;background:#fff;z-index:5}
  .compose textarea{padding:8px 10px;font-size:13px;min-height:38px}
  .compose button{padding:8px 14px;font-size:13px}
  .templates{padding:6px 10px;gap:4px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tpl-btn{flex-shrink:0;font-size:.7rem;padding:3px 8px}
  .tpl-label{font-size:.7rem}
  .send-status{padding:2px 10px;font-size:.7rem}
  .back-link{font-size:.8rem;margin-bottom:10px}
}
@media(max-width:400px){
  .container{padding:6px}
  .profile{padding:10px}
  .profile-item .label{min-width:60px}
  .chat-list{max-height:calc(100vh - 340px)}
}
</style></head><body>
<nav class="nav">
  <a href="/dashboard">Dashboard</a>
  <a href="/ai-manager">AI Manager</a>
  <a href="/audit">Audit Log</a>
  <a href="/logout" style="margin-left:auto">Logout</a>
</nav>
<div class="container">
  <a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>
  <div class="profile" id="profile"><div class="loading">Loading...</div></div>
  <div class="chat">
    <div class="chat-header">
      <h2>Message History</h2>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="msg-count" id="msgCount"></span>
        <a style="font-size:.75rem;color:#2563eb;cursor:pointer;text-decoration:none" onclick="exportMessages()">Export CSV</a>
      </div>
    </div>
    <div class="chat-list" id="chatList"><div class="loading">Loading...</div></div>
    <div class="templates" id="tplBar">
      <span class="tpl-label">Quick:</span>
    </div>
    <div class="send-status" id="sendStatus"></div>
    <div class="compose">
      <textarea id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>
<script>
const phone = decodeURIComponent(location.pathname.split('/').pop());
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

const TEMPLATES = [
  {label:'Greeting', text:'Hi! This is LOCACRYSTAL. How can I help you today?'},
  {label:'Thanks', text:'Thank you for your inquiry! We will get back to you shortly with the details.'},
  {label:'Follow up', text:'Hi, just following up on our previous conversation. Do you have any updates or questions?'},
  {label:'Price info', text:'Thank you for your interest! Could you please share more details about the quantity and specifications you need so we can provide an accurate quote?'},
  {label:'Order update', text:'Your order is being processed. We will update you once it is ready for shipment.'},
  {label:'Sample', text:'We would be happy to send you samples. Could you please confirm your shipping address?'},
];
(function initTemplates(){
  const bar=document.getElementById('tplBar');
  TEMPLATES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tpl-btn';
    btn.textContent=t.label;
    btn.onclick=()=>{
      const input=document.getElementById('msgInput');
      input.value=t.text;
      input.focus();
      input.style.height='auto';
      input.style.height=Math.min(input.scrollHeight,120)+'px';
    };
    bar.appendChild(btn);
  });
})();
function fmtTime(ts){
  return new Date(ts*1000).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  return new Date(ts*1000).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});
}

let allMessages = [];
let profile = {};

// ── Options for select fields ────────────────────────────────────
const SIZE_OPTS = ['','big','medium','small'];
const TIER_OPTS = ['','S','A','B','C','D'];
const STAGE_OPTS = ['','new_lead','contacted','qualified','negotiating','sampling','ordered','repeat_buyer','dormant','lost'];
const PRIO_OPTS = ['','high','medium','normal','low'];

// ── Editable field helpers ───────────────────────────────────────

function editText(field, value) {
  return '<span class="editable" id="ed-'+field+'" onclick="startEdit(\''+field+'\')">'
    + (esc(value) || '<em style="color:#cbd5e1">-</em>') + '</span>'
    + '<span class="save-status" id="ss-'+field+'"></span>';
}

function editSelect(field, value, opts) {
  let html = '<select class="edit-select" id="ed-'+field+'" onchange="saveField(\''+field+'\',this.value)">';
  opts.forEach(o => {
    const sel = (o === (value||'')) ? ' selected' : '';
    html += '<option value="'+esc(o)+'"'+sel+'>'+(o||'--')+'</option>';
  });
  html += '</select><span class="save-status" id="ss-'+field+'"></span>';
  return html;
}

function startEdit(field) {
  const el = document.getElementById('ed-'+field);
  if (!el || el.tagName === 'INPUT') return;
  const cur = profile[field] || '';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'edit-input'; inp.value = cur; inp.id = 'ed-'+field;
  inp.onkeydown = function(e) {
    if (e.key==='Enter') saveField(field, this.value);
    if (e.key==='Escape') renderProfile();
  };
  inp.onblur = function() { saveField(field, this.value); };
  el.replaceWith(inp);
  inp.focus(); inp.select();
}

async function saveField(field, value) {
  const v = (value||'').trim();
  if (v === (profile[field]||'')) { renderProfile(); return; }
  const ss = document.getElementById('ss-'+field);
  try {
    const res = await fetch('/api/v1/customer/'+encodeURIComponent(phone)+'/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({[field]: v}),
    });
    const data = await res.json();
    if (res.ok && data.status==='ok') {
      profile[field] = v;
      renderProfile();
      const s2 = document.getElementById('ss-'+field);
      if (s2) {
        s2.textContent = data.hubspot_synced ? 'Synced' : 'Saved';
        s2.className = 'save-status show';
        setTimeout(()=>{ s2.className='save-status'; }, 2500);
      }
    } else {
      if(ss){ss.textContent='Error';ss.className='save-status show err';}
    }
  } catch(e) {
    if(ss){ss.textContent='Error';ss.className='save-status show err';}
  }
}

// ── Profile render ───────────────────────────────────────────────

function renderProfile() {
  const p = profile;
  if (!p||!p.phone) { document.getElementById('profile').innerHTML='<div class="loading">Customer not found</div>'; return; }
  const tier = p.customer_tier;
  const tierBadge = tier ? '<span class="badge '+tier+'">'+tier+'</span>' : '';
  const stageBadge = p.customer_stage ? '<span class="stage-badge">'+esc(p.customer_stage)+'</span>' : '';

  document.getElementById('profile').innerHTML =
    '<h1>'+esc(p.customer_name||p.display_name||p.phone)+' '+tierBadge+' '+stageBadge+'</h1>'+
    '<div class="profile-grid">'+
      '<div class="profile-item"><span class="label">Phone:</span> <span class="val">+'+esc(p.phone)+'</span></div>'+
      '<div class="profile-item"><span class="label">Name:</span> '+editText('customer_name',p.customer_name)+'</div>'+
      '<div class="profile-item"><span class="label">Display:</span> '+editText('display_name',p.display_name)+'</div>'+
      '<div class="profile-item"><span class="label">Location:</span> '+editText('location',p.location)+'</div>'+
      '<div class="profile-item"><span class="label">Size:</span> '+editSelect('customer_size',p.customer_size,SIZE_OPTS)+'</div>'+
      '<div class="profile-item"><span class="label">Tier:</span> '+editSelect('customer_tier',p.customer_tier,TIER_OPTS)+'</div>'+
      '<div class="profile-item"><span class="label">Stage:</span> '+editSelect('customer_stage',p.customer_stage,STAGE_OPTS)+'</div>'+
      '<div class="profile-item"><span class="label">Priority:</span> '+editSelect('intent_priority',p.intent_priority,PRIO_OPTS)+'</div>'+
      '<div class="profile-item"><span class="label">Product:</span> '+editText('product_interest',p.product_interest)+'</div>'+
      '<div class="profile-item"><span class="label">Messages:</span> <span class="val">'+(p.total_messages||0)+'</span></div>'+
      '<div class="profile-item"><span class="label">First:</span> <span class="val">'+(p.first_message_at?p.first_message_at.substring(0,10):'-')+'</span></div>'+
      '<div class="profile-item"><span class="label">Last:</span> <span class="val">'+(p.last_message_at?p.last_message_at.substring(0,10):'-')+'</span></div>'+
      '<div class="profile-item"><span class="label">Match:</span> <span class="val">'+esc(p.match_status||'-')+'</span></div>'+
      '<div class="profile-item"><span class="label">AI Reply:</span> <span class="val">'+(p.ai_disabled?'Disabled':'Enabled')+'</span></div>'+
    '</div>';

  document.title = (p.customer_name||p.display_name||p.phone)+' — CRM';
}

// ── Load ─────────────────────────────────────────────────────────

async function load(){
  const d = await fetch('/api/v1/customer/'+encodeURIComponent(phone)).then(r=>r.json());
  profile = d.profile || {};
  if(!profile.phone){
    document.getElementById('profile').innerHTML='<div class="loading">Customer not found</div>';
    return;
  }
  renderProfile();
  allMessages = d.messages;
  renderMessages();
}

function renderMessages(){
  const msgs = allMessages;
  document.getElementById('msgCount').textContent = msgs.length + ' messages';
  if(!msgs.length){
    document.getElementById('chatList').innerHTML='<div class="loading">No messages</div>';
    return;
  }
  let html='', lastDate='';
  for(const m of msgs){
    const date = fmtDate(m.timestamp);
    if(date!==lastDate){ html+='<div class="day-sep">'+date+'</div>'; lastDate=date; }
    let content = esc(m.content||'');
    if(m.msg_type!=='text'){
      content = content ? '<span class="media-tag">['+esc(m.msg_type)+']</span> '+content : '<span class="media-tag">['+esc(m.msg_type)+']</span>';
    }
    html+='<div class="msg '+m.direction+'">'+content+'<div class="meta">'+fmtTime(m.timestamp)+'</div></div>';
  }
  document.getElementById('chatList').innerHTML=html;
  const cl=document.getElementById('chatList');
  cl.scrollTop=cl.scrollHeight;
}

async function sendMsg(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text) return;
  const btn=document.getElementById('sendBtn');
  const status=document.getElementById('sendStatus');
  btn.disabled=true; status.textContent='Sending...'; status.className='send-status';
  try{
    const res=await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:phone,text:text})});
    const data=await res.json();
    if(data.status==='sent'){
      input.value=''; status.textContent='Sent!';
      allMessages.push({direction:'outbound',msg_type:'text',content:text,timestamp:Math.floor(Date.now()/1000)});
      renderMessages();
      setTimeout(()=>{status.textContent=''},2000);
    } else { status.textContent='Failed: '+(data.error||'unknown'); status.className='send-status error'; }
  } catch(e) { status.textContent='Error: '+e.message; status.className='send-status error'; }
  btn.disabled=false;
}

document.getElementById('msgInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});

function exportMessages(){
  window.location.href='/api/v1/export/messages?phone='+encodeURIComponent(phone);
}

load();
</script></body></html>
