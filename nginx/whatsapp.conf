# Nginx reverse proxy for WhatsApp CRM Bridge
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# Prerequisites:
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL managed by Certbot — paths will be auto-filled
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Meta webhook can send large payloads with media
        client_max_body_size 50m;
    }
}
